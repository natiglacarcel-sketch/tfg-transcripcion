<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Transcriptor TFG</title>
</head>
<body>

<h1>Transcripción de audio</h1>

<input type="file" id="file"><br><br>

<label>Modelo:</label>
<select id="modelo">
  <option value="tiny">Tiny</option>
  <option value="base">Base</option>
  <option value="small" selected>Small</option>
</select><br><br>

<button onclick="enviar()">Transcribir</button>

<p id="estado"></p>
<pre id="resultado"></pre>

<script>
async function enviar() {
    const file = document.getElementById("file").files[0];
    const modelo = document.getElementById("modelo").value;

    let formData = new FormData();
    formData.append("file", file);
    formData.append("model", modelo);

    let res = await fetch("/transcribir", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    let job = data.job_id;

    document.getElementById("estado").innerText = "En proceso...";

    let intervalo = setInterval(async () => {
        let r = await fetch("/estado/" + job);
        let d = await r.json();

        document.getElementById("estado").innerText = d.estado;

        if (d.estado === "completado") {
            clearInterval(intervalo);

            let txt = await fetch(d.urls.txt);
            let contenido = await txt.text();

            document.getElementById("resultado").innerText =
                "Modelo: " + d.modelo + "\n" +
                "Tiempo: " + d.duracion + " s\n\n" +
                contenido;
        }

        if (d.estado === "error") {
            clearInterval(intervalo);
            document.getElementById("estado").innerText = "Error: " + d.error;
        }

    }, 2000);
}
</script>

</body>
</html>
